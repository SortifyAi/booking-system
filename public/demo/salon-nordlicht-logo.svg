<svg xmlns="http://www.w3.org/2000/svg" width="560" height="150" viewBox="0 0 560 150" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Salon Nordlicht</title>
  <desc id="desc">Modernes Logo mit Nordlicht-Motiv – transparenter Hintergrund, funktioniert auf hellem und dunklem Grund.</desc>
  <defs>
    <linearGradient id="auroraTile" x1="24" y1="27" x2="120" y2="123" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.55" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="138" y1="48" x2="520" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="0.55" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
  </defs>

  <!-- Icon tile (carries its own contrast, so it reads on any background) -->
  <rect x="24" y="27" width="96" height="96" rx="26" fill="url(#auroraTile)"/>

  <!-- Aurora ribbons -->
  <path d="M38 88 C 54 58, 70 58, 86 80 C 96 94, 108 80, 112 62"
        stroke="#FFFFFF" stroke-opacity="0.95" stroke-width="5" stroke-linecap="round"/>
  <path d="M36 100 C 56 76, 72 104, 90 86 C 100 76, 110 92, 114 76"
        stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="4" stroke-linecap="round"/>

  <!-- Stars -->
  <circle cx="60" cy="50" r="2.6" fill="#FFFFFF"/>
  <circle cx="82" cy="44" r="1.8" fill="#FFFFFF" fill-opacity="0.9"/>
  <circle cx="100" cy="56" r="2.2" fill="#FFFFFF" fill-opacity="0.85"/>
  <circle cx="46" cy="62" r="1.4" fill="#FFFFFF" fill-opacity="0.8"/>

  <!-- Wordmark (gradient reads on light & dark) -->
  <text x="138" y="74" fill="url(#wordmark)" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="38" font-weight="800" letter-spacing="-0.5">Salon Nordlicht</text>
  <text x="140" y="100" fill="#94A3B8" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="14.5" font-weight="600" letter-spacing="3">HAIR · BEAUTY · TERMINE</text>
</svg>
